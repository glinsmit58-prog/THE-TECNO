{% extends "base.html" %}
{% block content %}
<div class="form card auth-card">
  <h2>تعيين كلمة مرور جديدة</h2>
  <form method="post" id="reset-form" novalidate>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <label>كلمة المرور الجديدة</label>
    <div class="pw-wrap">
      <input type="password" name="password" id="rp-password" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <button type="button" class="pw-toggle" data-pw-target="rp-password" data-show-id="eye-show-rpa" data-hide-id="eye-hide-rpa" aria-label="إظهار كلمة المرور">
        <svg id="eye-show-rpa" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eye-hide-rpa" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <label style="margin-top:14px">تأكيد كلمة المرور</label>
    <div class="pw-wrap">
      <input type="password" name="password_confirm" id="rp-confirm" required minlength="6" autocomplete="new-password" placeholder="••••••••">
      <button type="button" class="pw-toggle" data-pw-target="rp-confirm" data-show-id="eye-show-rpc" data-hide-id="eye-hide-rpc" aria-label="إظهار كلمة المرور">
        <svg id="eye-show-rpc" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <svg id="eye-hide-rpc" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>

    <button class="btn primary" type="submit" style="margin-top:20px;width:100%">حفظ كلمة المرور</button>
  </form>
</div>
<script nonce="{{ csp_nonce }}">
// V70 CSP: replace inline togglePw click handlers with delegation
// driven by data-pw-target / data-show-id / data-hide-id.
function togglePw(inputId, showId, hideId) {
  var inp = document.getElementById(inputId);
  if (!inp) return;
  var isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  var show = document.getElementById(showId);
  var hide = document.getElementById(hideId);
  if (show) show.style.display = isHidden ? 'none' : '';
  if (hide) hide.style.display = isHidden ? '' : 'none';
}
document.querySelectorAll('.pw-toggle[data-pw-target]').forEach(function(btn){
  btn.addEventListener('click', function(){
    togglePw(btn.dataset.pwTarget, btn.dataset.showId, btn.dataset.hideId);
  });
});
</script>
{% endblock %}
