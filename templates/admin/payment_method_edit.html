{% extends "base.html" %}
{% block content %}
<div class="form card">
  <h2>تعديل طريقة الدفع</h2>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>الاسم</label>
    <input name="name" value="{{ method.name }}" required>

    <label>الأيقونة</label>
    <input name="emoji" value="{{ method.emoji }}" required>

    <label>عملة طريقة الدفع</label>
    <select name="currency">
      <option value="USD" {% if method.currency=="USD" %}selected{% endif %}>دولار</option>
      <option value="SYP" {% if method.currency=="SYP" %}selected{% endif %}>ليرة سورية</option>
    </select>

    <label>العنوان / الرقم</label>
    <textarea name="address" rows="4" required>{{ method.address }}</textarea>

    <label>تعليمات الدفع</label>
    <textarea name="instructions" rows="5" required>{{ method.instructions }}</textarea>

    <label style="display:flex;gap:10px;align-items:center">
      <input type="checkbox" name="active" value="1" {% if method.active %}checked{% endif %} style="width:auto">
      مفعلة
    </label>

    {# V69: بعض الطرق (مثل "ضمن المركز") لا تحتاج إيصالاً لأن الدفع وجاهي. #}
    <label style="display:flex;gap:10px;align-items:center">
      <input type="checkbox" name="requires_proof" value="1" {% if method.requires_proof %}checked{% endif %} style="width:auto">
      تتطلب إيصال/إثبات دفع من المستخدم
    </label>
    <p class="muted" style="margin-top:-4px;font-size:13px">
      أزل العلامة لطرق الدفع الوجاهية (مثل "ضمن المركز") لتفادي إجبار المستخدم على رفع إيصال.
    </p>

    <button class="btn primary" type="submit" style="margin-top:18px;width:100%">حفظ</button>
  </form>
</div>
{% endblock %}
