{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1>نسيت كلمة المرور</h1>
  <p class="muted">اكتب بريدك، وسنرسل رابط استعادة إذا كان الحساب موجودًا.</p>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>البريد الإلكتروني
      <input type="email" name="email" required>
    </label>
    <button class="btn primary" type="submit">إرسال رابط الاستعادة</button>
  </form>
</div>
{% endblock %}
